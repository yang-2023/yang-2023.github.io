      <h4 id="1-if语句"><a href="#1-if语句" class="headerlink" title="1.if语句"></a>1.if语句</h4><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">if 条件语句 &#123;</span><br><span class="line">   </span><br><span class="line">&#125;erse if 条件语句&#123;</span><br><span class="line">   &#125;else &#123;</span><br><span class="line">      </span><br><span class="line">   &#125;</span><br></pre></td></tr></table></figure>

<h4 id="2-switch选择语句"><a href="#2-switch选择语句" class="headerlink" title="2.switch选择语句"></a>2.switch选择语句</h4><p>1.分支较多选择switch语句.默认从上到下逐一分析.一旦满足条件就会执行并且返回.自带break。</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">switch i:=6; &#123;</span><br><span class="line">   case i&gt;10:</span><br><span class="line">      fmt.Println(i)</span><br><span class="line">   case i&gt;5 &amp;&amp; i&lt;10:</span><br><span class="line">      fmt.Println(i)</span><br><span class="line">    default:</span><br><span class="line">      fmt.Println(&quot;i&lt;=5&quot;)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>2.switch后带表达式.</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">switch i:=6;j</span><br></pre></td></tr></table></figure>

<p>假如设置</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">var j=3.66</span><br></pre></td></tr></table></figure>

<p>那么</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">switch i:=6;j &#123;</span><br><span class="line">   case i&gt;10:</span><br><span class="line">      fmt.Println(i)</span><br><span class="line">   case i&gt;5 &amp;&amp; i&lt;10:</span><br><span class="line">      fmt.Println(i)</span><br><span class="line">    default:</span><br><span class="line">      fmt.Println(&quot;i&lt;=5&quot;)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>会整体报错.因为case后的值的类型必须是和；后的j类型一样</p>
<p>同样也可以是字符串类型等</p>
<p>3.switch语句较为强大</p>
<p>所以表达式可以很随意</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">switch 1&lt;5 &#123;</span><br><span class="line">   case true:</span><br><span class="line">      fmt.Println(&quot;t&quot;)</span><br><span class="line">   case false:</span><br><span class="line">      fmt.Println(&quot;f&quot;)</span><br><span class="line">    default:</span><br><span class="line">      fmt.Println(&quot;n&quot;)</span><br><span class="line"></span><br><span class="line">   &#125;</span><br></pre></td></tr></table></figure>
